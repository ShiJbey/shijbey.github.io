- name: 'EXAG 2022 Workshop Stickers'
  summary: >
      I made these stickers for the 2022 Experimental AI in Games Workshop (EXAG) hosted at the AAAI Conference on Artificial Intelligence and Interactive Digital Entertainment. The conference theme for that year was "Mis-spun Tales". I wanted to make a memorable sticker that reflected this theme.
  img_src: '/static/images/graphic_design/exag_stickers.jpg'
  img_alt: 'stickers on a table'

- name: 'ICIDS 2022 Conference Website'
  summary: >
      I served as publicity chair for the 2022 International Conference on Interactive Digital Storytelling. My responsibilities included designing, deploying, and updating the conference website.
  img_src: '/static/images/graphic_design/ICIDS.jpg'
  img_alt: 'screenshot of ICIDS 2022 website'

- name: Carnegie Mellon Research Lab Logo
  summary: >
      While I was a student at Carnegie Mellon University, I designed a lab. At the time, we were known as the "Neural Web Research Group" (now known as the "∀ (For All) Lab"). My design was used for laptop stickers and apparel.
  img_src: '/static/images/graphic_design/neural_web_sticker.jpg'
  img_alt: 'screenshot of sticker design'

- name: 'University of Delaware RISE program newsletters 2015-2017'
  summary: >
      As part of my service on the student advisory council, I designed the 2015, 2016, and 2017 annual newsletters for the RISE program at the University of Delaware. Each newsletter was a compilation of individual articles produced by other members of the council.
  img_src: '/static/images/graphic_design/RISE_Newsletter.jpg'
  img_alt: 'Front page of the RISE 2017 newsletter'
